<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Regulatory Index Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c8c5bb;
    --text: #1a1916;
    --text-muted: #7a776e;
    --text-faint: #b0ada4;
    --accent: #1a1916;
    --tag-us-bg: #e8f4e8; --tag-us-text: #1a4d1a;
    --tag-eu-bg: #e6eef8; --tag-eu-text: #0f3566;
    --tag-mdsap-bg: #fdf0e0; --tag-mdsap-text: #6b3d00;
    --tag-scope-bg: #f0ede8; --tag-scope-text: #5a5750;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.5rem; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .logo-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }

  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-faint); pointer-events: none; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px 10px 38px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]::placeholder { color: var(--text-faint); }
  input[type="text"]:focus { border-color: var(--border-strong); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--border-strong); color: var(--text); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }

  .count-line { font-size: 12px; color: var(--text-faint); font-family: 'DM Mono', monospace; margin-bottom: 1rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    text-decoration: none;
    display: block;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; letter-spacing: -0.01em; }
  .card-full { font-size: 12px; color: var(--text-muted); line-height: 1.45; margin-bottom: 10px; }
  .tag-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-us    { background: var(--tag-us-bg);    color: var(--tag-us-text); }
  .tag-eu    { background: var(--tag-eu-bg);    color: var(--tag-eu-text); }
  .tag-mdsap { background: var(--tag-mdsap-bg); color: var(--tag-mdsap-text); }
  .tag-scope { background: var(--tag-scope-bg); color: var(--tag-scope-text); }

  .empty { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-faint); font-size: 14px; }

  footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-faint); font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <div class="logo-dot"></div>
      <span class="logo-label">Regulatory Index</span>
    </div>
    <h1>List of links</h1>
    <p class="subtitle">Modified 2026-05-04 / Carolyn</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search agencies, acronyms, or topics…" oninput="renderResults()" />
    </div>
    <div class="filter-row" id="filters"></div>
  </div>

  <div class="count-line" id="countLine"></div>
  <div class="grid" id="grid"></div>

  <footer>click any card to open the agency's official website</footer>
</div>

<script>
const agencies = [
  { name: "FDA", full: "Food & Drug Administration", regions: ["us"], scopes: ["Medical Devices","Drugs","Biologics"], url: "https://www.fda.gov" },
  { name: "EMA", full: "European Medicines Agency", regions: ["eu"], scopes: ["Drugs","Biologics","ATMPs"], url: "https://www.ema.europa.eu" },
  { name: "MDR/IVDR", full: "EU Medical Device & IVD Regulations", regions: ["eu"], scopes: ["Medical Devices","IVDs"], url: "https://health.ec.europa.eu/medical-devices-sector_en" },
  { name: "Notified Bodies", full: "EU Conformity Assessment Bodies (MDR/IVDR)", regions: ["eu"], scopes: ["Medical Devices","Certification"], url: "https://ec.europa.eu/growth/tools-databases/nando/" },
  { name: "FDA (MDSAP)", full: "FDA — MDSAP participant (US)", regions: ["mdsap","us"], scopes: ["Medical Devices"], url: "https://www.fda.gov/medical-devices/cdrh-international-programs/mdsap" },
  { name: "IMDRF", full: "International Medical Device Regulators Forum", regions: ["mdsap"], scopes: ["Medical Devices","Harmonization"], url: "https://www.imdrf.org" },
  { name: "ISO 13485", full: "QMS standard underpinning MDSAP audits", regions: ["mdsap"], scopes: ["Quality Systems","Medical Devices"], url: "https://www.iso.org/standard/59752.html" },
];

const ALL_FILTERS = [
  { id: "all", label: "All" },
  { id: "us", label: "US" },
  { id: "eu", label: "EU" },
  { id: "mdsap", label: "MDSAP" },
];

let activeFilter = "all";

function buildFilters() {
  document.getElementById("filters").innerHTML = ALL_FILTERS.map(f =>
    `<button class="pill ${f.id === activeFilter ? 'active' : ''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join("");
}

function setFilter(id) {
  activeFilter = id;
  buildFilters();
  renderResults();
}

function renderResults() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = agencies.filter(a => {
    const matchRegion = activeFilter === "all" || a.regions.includes(activeFilter);
    const matchQ = !q || a.name.toLowerCase().includes(q) || a.full.toLowerCase().includes(q) || a.scopes.some(s => s.toLowerCase().includes(q));
    return matchRegion && matchQ;
  });

  document.getElementById("countLine").textContent = `${filtered.length} result${filtered.length === 1 ? '' : 's'}`;

  const grid = document.getElementById("grid");
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">No agencies match your search.</div>`;
    return;
  }
  grid.innerHTML = filtered.map(a => `
    <a class="card" href="${a.url}" target="_blank" rel="noopener">
      <div class="card-name">${a.name}</div>
      <div class="card-full">${a.full}</div>
      <div class="tag-row">
        ${[...new Set(a.regions)].map(r =>
          r === "eu"    ? `<span class="tag tag-eu">EU</span>` :
          r === "us"    ? `<span class="tag tag-us">US</span>` :
          r === "mdsap" ? `<span class="tag tag-mdsap">MDSAP</span>` : ""
        ).join("")}
        ${a.scopes.slice(0,2).map(s => `<span class="tag tag-scope">${s}</span>`).join("")}
      </div>
    </a>
  `).join("");
}

buildFilters();
renderResults();
</script>
</body>
</html>
